services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile

    depends_on:
      - db

    volumes:
      - ../..:/workspaces:cached
  
    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity

    # Runs app on the same network as the database container, allows "forwardPorts" in devcontainer.json function.
    network_mode: service:db

    # Uncomment to connect as root instead. More info: https://aka.ms/dev-containers-non-root.
    # user: root

    # Use "forwardPorts" in **devcontainer.json** to forward an app port locally. 
    # (Adding the "ports" property to this file will not forward from a Codespace.)

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      MSSQL_SA_PASSWORD: MessageHawk_Dev_123
      ACCEPT_EULA: Y
    #ports:
    #  - "1433:1433"
    # Add "forwardPorts": ["db:1433"] to **devcontainer.json** to forward MSSQL locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)

  rabbitmq:
    image: rabbitmq:3.13-management
    #ports:
    #  - "5672:5672" # AMQP
    #  - "15672:15672" # Management UI
    # Add "forwardPorts": ["rabbitmq:5672", "rabbitmq:15672"] to **devcontainer.json** to forward RabbitMQ locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
